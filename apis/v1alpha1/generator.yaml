ignore:
  resource_names: []
  field_paths:
    # ClientToken is an idempotency token auto-filled by the AWS SDK
    # when nil. Not exposed to users.
    - CreateFileSystemInput.ClientToken
    - CreateFileSystemOutput.ClientToken
    # ClientToken on AccessPoint is also an idempotency token auto-filled
    # by the AWS SDK. Not exposed to users. (Note: CreateAccessPointOutput.Status
    # is NOT ignored — the code-generator handles the SDK Status field
    # natively as status.status.)
    - CreateAccessPointInput.ClientToken
    - CreateAccessPointOutput.ClientToken

resources:
  FileSystem:
    synced:
      when:
        - path: Status.Status
          in:
            - available
    exceptions:
      errors:
        404:
          code: ResourceNotFoundException
      terminal_codes:
        - ValidationException
    update_operation:
      custom_method_name: customUpdateFileSystem
    print:
      order_by: index
      additional_columns:
        - name: FILESYSTEMID
          json_path: .status.fileSystemID
          type: string
          index: 0
        - name: STATUS
          json_path: .status.status
          type: string
          index: 1
    fields:
      # AcceptBucketWarning is create-only and not returned by GetFileSystem.
      # compare.is_ignored prevents false diffs on reconciliation.
      AcceptBucketWarning:
        compare:
          is_ignored: true
      # --- Cross-resource references ---
      Bucket:
        references:
          resource: Bucket
          service_name: s3
          path: Status.ACKResourceMetadata.ARN
      KMSKeyID:
        references:
          resource: Key
          service_name: kms
          path: Status.ACKResourceMetadata.ARN
      RoleARN:
        references:
          resource: Role
          service_name: iam
          path: Status.ACKResourceMetadata.ARN
      # --- Custom spec fields ---
      # Policy is the FileSystemPolicy JSON document, managed via
      # Put/Get/DeleteFileSystemPolicy sub-resource APIs. The from config
      # pulls the field description from the PutFileSystemPolicy API shape
      # into the CRD for kubectl explain documentation.
      Policy:
        from:
          operation: PutFileSystemPolicy
          path: Policy
        is_iam_policy: true
      # ImportDataRules and ExpirationDataRules are sourced from the
      # PutSynchronizationConfiguration operation.
      ImportDataRules:
        from:
          operation: PutSynchronizationConfiguration
          path: ImportDataRules
        compare:
          is_ignored: true
      ExpirationDataRules:
        from:
          operation: PutSynchronizationConfiguration
          path: ExpirationDataRules
        compare:
          is_ignored: true
      # --- Custom status fields ---
      LatestVersionNumber:
        from:
          operation: GetSynchronizationConfiguration
          path: LatestVersionNumber
        is_read_only: true
    hooks:
      sdk_read_one_post_set_output:
        template_path: hooks/file_system/sdk_read_one_post_set_output.go.tpl
  MountTarget:
    # S3 Files TagResource/UntagResource only support file systems and access
    # points. MountTarget is not a taggable resource.
    # https://docs.aws.amazon.com/AmazonS3/latest/userguide/s3-files-tagging.html
    tags:
      ignore: true
    synced:
      when:
        - path: Status.Status
          in:
            - available
    exceptions:
      errors:
        404:
          code: ResourceNotFoundException
      terminal_codes:
        - ValidationException
    print:
      order_by: index
      additional_columns:
        - name: ID
          json_path: .status.id
          type: string
          index: 0
        - name: STATUS
          json_path: .status.status
          type: string
          index: 1
    fields:
      # ID is the renamed MountTargetId — primary key for Get/Update/Delete
      ID:
        is_primary_key: true
      # --- Spec fields with cross-resource references ---
      FileSystemId:
        references:
          resource: FileSystem
          path: Status.FileSystemID
      SubnetId:
        references:
          resource: Subnet
          service_name: ec2
          path: Status.SubnetID
      SecurityGroups:
        references:
          resource: SecurityGroup
          service_name: ec2
          path: Status.ID
    renames:
      operations:
        CreateMountTarget:
          input_fields:
            MountTargetId: ID
        GetMountTarget:
          input_fields:
            MountTargetId: ID
        UpdateMountTarget:
          input_fields:
            MountTargetId: ID
        DeleteMountTarget:
          input_fields:
            MountTargetId: ID
    hooks:
      sdk_read_one_post_set_output:
        template_path: hooks/mount_target/sdk_read_one_post_set_output.go.tpl
  AccessPoint:
    synced:
      when:
        - path: Status.Status
          in:
            - available
    exceptions:
      errors:
        404:
          code: ResourceNotFoundException
      terminal_codes:
        - ValidationException
    update_operation:
      custom_method_name: customUpdateAccessPoint
    print:
      order_by: index
      additional_columns:
        - name: ID
          json_path: .status.id
          type: string
          index: 0
        - name: FILESYSTEMID
          json_path: .spec.fileSystemID
          type: string
          index: 1
        - name: STATUS
          json_path: .status.status
          type: string
          index: 2
    fields:
      # ID is the renamed AccessPointId — primary key for Get/Delete.
      ID:
        is_primary_key: true
      FileSystemId:
        references:
          resource: FileSystem
          path: Status.FileSystemID
    hooks:
      sdk_read_one_post_set_output:
        template_path: hooks/access_point/sdk_read_one_post_set_output.go.tpl
    renames:
      operations:
        CreateAccessPoint:
          output_fields:
            AccessPointId: ID
        GetAccessPoint:
          input_fields:
            AccessPointId: ID
          output_fields:
            AccessPointId: ID
        DeleteAccessPoint:
          input_fields:
            AccessPointId: ID
